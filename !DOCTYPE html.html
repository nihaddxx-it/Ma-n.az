<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoriva & GymBro Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0e0e0e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .container { max-width: 600px; background: #181818; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2a2a; }
        h1 { font-size: 2.5rem; color: #e63946; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; font-size: 1.1rem; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: block; background: #ff6b35; color: white; text-decoration: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #e63946; transform: translateY(-3px); }
        .btn-alt { background: #4fc3f7; color: #0e0e0e; }
        .btn-alt:hover { background: #29b6f6; }
        footer { margin-top: 40px; color: #444; font-size: 0.9rem; }
    </style>
</head>
